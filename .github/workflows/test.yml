name: Test project
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: get code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v3              
              with:
                node-version: 18
            - name: install dependencies
              run: npm ci
            - name: Run tests
              run: npm test